ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ODOMETRY (From Encoders)
    # The input topic is /odom_raw (we will rename /odom to /odom_raw in the python script later)
    odom0: /odom_raw
    
    # The config matrix determines which variables are used:
    # [x, y, z,
    #  roll, pitch, yaw,
    #  vx, vy, vz,
    #  vroll, vpitch, vyaw,
    #  ax, ay, az]
    # We use x, y (position) and yaw (orientation) from odometry.
    # Also linear velocity x and angular velocity yaw.
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]
    
    odom0_differential: false
    odom0_relative: false

    # IMU
    imu0: /imu/data
    
    # We use angular velocity (yaw rate) from the IMU.
    # We can also use linear acceleration if we want, but yaw rate is the most important.
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true, false, false]
    
    imu0_differential: false
    imu0_relative: true  # Reset orientation to 0 at start
    imu0_remove_gravitational_acceleration: true
